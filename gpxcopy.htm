<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>皮克敏飛人小工具-Gpx座標提取器</title>
    <link rel="manifest" href="manifest-copy.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>

    <script>
        // 1. 禁止右鍵選單
        document.addEventListener('contextmenu', e => e.preventDefault());

        // 2. 禁止開發者工具快捷鍵
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) return false;
            if (e.ctrlKey && e.keyCode == 85) return false;
        };

        // 3. 偵測開發者工具 (Debugger 陷阱)
        (function() {
            var check = function() {
                const start = new Date();
                debugger; 
                const end = new Date();
                if (end - start > 100) {
                    window.location.href = "about:blank";
                }
            };
            setInterval(check, 2000);
        })();
    </script>

    <style>
        :root {
            --primary: #2f9e44;
            --primary-light: #ebfbee;
            --bg: #f8f9fa;
            --text: #212529;
            --card-bg: #ffffff;
            --border: #dee2e6;
            --danger: #e03131;
            --blue: #1c7ed6;
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-bottom: env(safe-area-inset-bottom);
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 550px; }

        header { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        header h1 { color: var(--primary); margin: 0; font-size: 22px; letter-spacing: 0.5px; }
        header p { color: #868e96; font-size: 14px; margin-top: 6px; font-weight: 500; }

        .step-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 18px;
            border: 1px solid #e9ecef; position: relative;
        }

        .step-number {
            position: absolute; top: -10px; left: 20px;
            background: var(--primary); color: white;
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold;
        }

        label { font-weight: 700; display: block; margin-bottom: 12px; font-size: 15px; }

        .upload-row { display: flex; gap: 8px; align-items: stretch; }
        .upload-area {
            flex: 1; border: 2px dashed #ced4da; border-radius: 12px;
            padding: 18px; text-align: center; cursor: pointer;
            background: var(--primary-light); transition: 0.2s;
        }
        .upload-area.dragover { border-color: var(--primary); background: #d3f9d8; }
        .upload-area p { margin: 0; font-size: 13px; color: var(--primary); font-weight: 600; }
        
        .btn-clear {
            background: #fff; color: var(--danger); border: 1.5px solid var(--danger);
            border-radius: 12px; padding: 0 12px; cursor: pointer; font-weight: bold;
            font-size: 13px;
        }

        #gpxFile { display: none; }

        /* 輸入框底色改為白色 */
        .result-area {
            width: 100%; height: 150px; border: 1.5px solid var(--border);
            border-radius: 12px; padding: 12px; box-sizing: border-box;
            font-family: 'SF Mono', Menlo, monospace; font-size: 13px; resize: none;
            background: #ffffff; color: #495057; transition: border-color 0.2s;
        }
        .result-area:focus { border-color: var(--primary); }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-sub {
            padding: 12px; border: none; border-radius: 10px; font-weight: bold;
            cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .btn-copy { background: var(--blue); color: white; }
        .btn-select { background: #adb5bd; color: white; }
        .btn-sub:active { opacity: 0.8; }

        #fileNameInput {
            width: 100%; padding: 12px; border: 1.5px solid var(--border);
            border-radius: 10px; box-sizing: border-box; font-size: 14px;
            background: #ffffff; -webkit-appearance: none;
        }
        #fileNameInput:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

        .hint { font-size: 12px; color: #868e96; margin-top: 10px; line-height: 1.5; font-weight: 500; }

        .btn-convert {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 15px; font-size: 17px; font-weight: bold;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-convert:active { opacity: 0.8; transform: scale(0.98); }

        #status {
            margin-top: 15px; text-align: center; font-size: 12px; color: var(--primary);
            background: var(--primary-light); padding: 10px; border-radius: 10px; display: none;
        }
    </style>
</head>
<body onselectstart="return false">
<div class="container">
    <header>
        <h1>🌱 皮克敏 GPX 座標提取器</h1>
        <p>上傳檔案，自動移除重複座標</p>
    </header>

    <div class="step-card">
        <div class="step-number">1</div>
        <label>上傳原始檔案(支援 .gpx / .xml)</label>
        <div class="upload-row">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('gpxFile').click()">
                <p id="fileLabel">選取或拖入檔案</p>
                <input type="file" id="gpxFile" accept=".gpx,.xml,application/gpx+xml,application/xml,text/xml,text/plain,*/*">
            </div>
            <button class="btn-clear" onclick="resetAll()">清空</button>
        </div>
    </div>

    <div class="step-card">
        <div class="step-number">2</div>
        <label>提取結果 (緯度,經度)</label>
        <textarea id="resultText" class="result-area" readonly placeholder="等待檔案上傳..."></textarea>
        <div class="action-grid">
            <button class="btn-sub btn-select" onclick="selectAllText()">全選座標</button>
            <button class="btn-sub btn-copy" onclick="copyToClipboard()">一鍵複製</button>
        </div>
    </div>

    <div class="step-card">
        <div class="step-number">3</div>
        <label>修改/確認檔名</label>
        <input type="text" id="fileNameInput" placeholder="等待解析...">
        <p class="hint">※ 點擊下方按鈕將下載為 .txt 純文字檔</p>
        <div id="status"></div>
    </div>

    <button id="convertBtn" class="btn-convert" onclick="downloadTxt()">
        💾 下載 Txt 座標檔
    </button>
</div>

<script>
    let extractedPts = [];
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('gpxFile');
    const nameInput = document.getElementById('fileNameInput');
    const resultText = document.getElementById('resultText');
    const status = document.getElementById('status');

    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            processGpxFile();
        }
    };

    fileInput.onchange = processGpxFile;

    function resetAll() {
        fileInput.value = ""; 
        extractedPts = []; 
        nameInput.value = "";
        resultText.value = "";
        document.getElementById('fileLabel').innerText = "選取或拖入檔案";
        status.style.display = "none";
    }

    async function getCombinedCountryNames(lat, lon) {
        try {
            const fetchEN = fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=3&addressdetails=1`, { headers: { 'Accept-Language': 'en' } }).then(r => r.json());
            const fetchZH = fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=3&addressdetails=1`, { headers: { 'Accept-Language': 'zh-TW' } }).then(r => r.json());
            const [dataEN, dataZH] = await Promise.all([fetchEN, fetchZH]);
            const nameEN = (dataEN.address && dataEN.address.country ? dataEN.address.country : "Unknown").replace(/\s+/g, '');
            const nameZH = (dataZH.address && dataZH.address.country ? dataZH.address.country : "未知").replace(/\s+/g, '');
            return `${nameEN}(${nameZH})`;
        } catch (e) { return "Unknown(未知)"; }
    }

    async function processGpxFile() {
        if (fileInput.files.length === 0) return;
        
        document.getElementById('fileLabel').innerText = "已選：" + fileInput.files[0].name;
        status.innerText = "正在提取並移除重複座標...";
        status.style.display = "block";

        const text = await fileInput.files[0].text();
        const regex = /lat=["']([\d.-]+)["']\s+lon=["']([\d.-]+)["']|lon=["']([\d.-]+)["']\s+lat=["']([\d.-]+)["']/g;
        
        let rawPts = [];
        let m;
        while ((m = regex.exec(text)) !== null) {
            let lat = m[1] !== undefined ? m[1] : m[4];
            let lon = m[1] !== undefined ? m[2] : m[3];
            rawPts.push({ lat, lon });
        }

        // 移除重複座標
        extractedPts = rawPts.filter((pt, idx, self) =>
            idx === self.findIndex((t) => t.lat === pt.lat && t.lon === pt.lon)
        );

        if (extractedPts.length === 0) {
            status.innerText = "❌ 無法解析座標資料";
            resultText.value = "無座標資料";
            return;
        }

        const coordString = extractedPts.map(p => `${p.lat},${p.lon}`).join('\n');
        resultText.value = coordString;

        const now = new Date();
        const dStr = now.getFullYear() + (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
        const countryTag = await getCombinedCountryNames(extractedPts[0].lat, extractedPts[0].lon);
        
        nameInput.value = `${countryTag}_${extractedPts.length}點_${dStr}`;
        status.innerText = `✨ 成功：原始 ${rawPts.length} 點 ➔ 去重後 ${extractedPts.length} 點`;
    }

    function selectAllText() {
        resultText.focus();
        resultText.select();
        resultText.setSelectionRange(0, 99999);
    }

    function copyToClipboard() {
        if (!resultText.value || resultText.value === "無座標資料") return;
        navigator.clipboard.writeText(resultText.value).then(() => {
            const oldStatus = status.innerText;
            status.innerText = "✅ 座標已複製！";
            setTimeout(() => { status.innerText = oldStatus; }, 1500);
        });
    }

    function downloadTxt() {
        const content = resultText.value;
        const fileName = nameInput.value.trim() || "extracted_coords";
        if (!content || content === "無座標資料") return;

        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${fileName}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
