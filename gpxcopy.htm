<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>皮克敏 GPX 座標提取助手</title>
    <div id="pwa-install-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; color:white; text-align:center; padding-top:20%;">
  <div style="background:#fff; color:#333; margin:0 10%; padding:20px; border-radius:20px;">
    <h2 style="color:#16a34a;">🌱 發現皮克敏工具！</h2>
    <p>安裝到桌面後，即可「隱藏網址列」全螢幕使用。</p>
    <button id="pwa-install-btn" style="background:#16a34a; color:white; border:none; padding:15px 30px; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer;">
      立即安裝到桌面
    </button>
    <p style="margin-top:15px; font-size:12px; color:#666;" id="ios-hint">Android 使用者請點上方按鈕</p>
  </div>
</div>

<script>
  let deferredPrompt;
  const overlay = document.getElementById('pwa-install-overlay');
  const btn = document.getElementById('pwa-install-btn');
  const iosHint = document.getElementById('ios-hint');

  // 1. 偵測 Android/Chrome 的安裝提示
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    overlay.style.display = 'block'; // 顯示安裝引導
  });

  btn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') overlay.style.display = 'none';
      deferredPrompt = null;
    }
  });

  // 2. 針對 iOS 使用者的特殊引導（iPhone 不支援點擊按鈕安裝）
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

  if (isIOS && !isStandalone) {
    overlay.style.display = 'block';
    btn.style.display = 'none'; // iOS 無法程式觸發，隱藏按鈕
    iosHint.innerHTML = "iPhone 使用者請點擊下方 <img src='https://img.icons8.com/ios/20/000000/share.png'/> 分享按鈕<br>然後選擇「<b>加入主畫面</b>」";
    iosHint.style.fontSize = "16px";
  }
</script>

    <link rel="manifest" href="manifest-copy.json">
    
    <style>
        :root {
            --primary: #2f9e44;
            --primary-light: #ebfbee;
            --bg: #f8f9fa;
            --text: #212529;
            --card-bg: #ffffff;
            --border: #e9ecef;
            --danger: #e03131;
            --blue: #1c7ed6;
        }

        /* 防止文字被選取（除了結果區域以外） */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 550px; }

        header { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        header h1 { color: var(--primary); margin: 0; font-size: 22px; letter-spacing: 0.5px; }
        header p { color: #868e96; font-size: 14px; margin-top: 6px; font-weight: 500; }

        .step-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 18px;
            border: 1px solid var(--border); position: relative;
        }

        .step-number {
            position: absolute; top: -10px; left: 20px;
            background: var(--primary); color: white;
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold;
        }

        label { font-weight: 700; display: block; margin-bottom: 12px; font-size: 15px; }

        .upload-row { display: flex; gap: 8px; align-items: stretch; }
        .upload-area {
            flex: 1; border: 2px dashed #ced4da; border-radius: 12px;
            padding: 18px; text-align: center; cursor: pointer;
            background: var(--primary-light); transition: 0.2s;
        }
        .upload-area.dragover { border-color: var(--primary); background: #d3f9d8; }
        .upload-area p { margin: 0; font-size: 13px; color: var(--primary); font-weight: 600; }
        
        .btn-clear {
            background: #fff; color: var(--danger); border: 1.5px solid var(--danger);
            border-radius: 12px; padding: 0 15px; cursor: pointer; font-weight: bold;
            font-size: 13px;
        }

        #gpxFile { display: none; }

        .result-area {
            width: 100%; height: 180px;
            background: #f1f3f5; border: 1px solid var(--border);
            border-radius: 12px; padding: 12px;
            font-family: "SF Mono", Monaco, Consolas, monospace;
            font-size: 13px; line-height: 1.6;
            overflow-y: auto; white-space: pre;
            margin-bottom: 15px;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        #fileNameInput {
            width: 100%; padding: 12px; border: 2px solid var(--border);
            border-radius: 10px; box-sizing: border-box; font-size: 14px;
            background: #fff; margin-bottom: 15px;
        }
        #fileNameInput:focus { outline: none; border-color: var(--primary); }

        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

        .btn-action {
            padding: 12px 5px; border: none; border-radius: 12px; 
            font-size: 13px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 4px;
            transition: 0.2s;
        }

        .btn-select { background: #e9ecef; color: #495057; }
        .btn-copy { background: var(--primary); color: white; }
        .btn-download { background: var(--blue); color: white; }
        .btn-action:active { transform: scale(0.95); opacity: 0.9; }

        #status {
            margin-top: 15px; text-align: center; font-size: 13px; color: var(--primary);
            background: var(--primary-light); padding: 10px; border-radius: 10px; display: none;
            font-weight: 600;
        }

        .hint { font-size: 12px; color: #868e96; margin-top: 10px; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <header>
        <h1>🌱 皮克敏 GPX 座標提取助手</h1>
        <p>上傳檔案，提取全部座標</p>
    </header>

    <div class="step-card">
        <div class="step-number">1</div>
        <label>上傳 GPX 檔案</label>
        <div class="upload-row">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('gpxFile').click()">
                <p id="fileLabel">選取或拖入 .gpx 檔案</p>
                <input type="file" id="gpxFile" accept=".gpx,.xml">
            </div>
            <button class="btn-clear" onclick="resetAll()">清空</button>
        </div>
    </div>

    <div class="step-card">
        <div class="step-number">2</div>
        <label>基礎檔名預覽 (可自行修改)</label>
        <input type="text" id="fileNameInput" placeholder="等待解析檔案名稱...">
        
        <label>提取結果 (緯度,經度)</label>
        <div id="resultBox" class="result-area"></div>

        <div class="action-grid">
            <button class="btn-action btn-select" onclick="selectAllText()">全選文字</button>
            <button class="btn-action btn-copy" onclick="copyToClipboard()">📋 一鍵複製</button>
            <button class="btn-action btn-download" onclick="downloadTxt()">💾 下載 TXT</button>
        </div>
        
        <div id="status"></div>
        <p class="hint">※ 系統已自動移除重複座標</p>
    </div>
</div>

<script>
    /* --- Service Worker 註冊 --- */
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }

    /* --- 防護功能區 --- */
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123) return false;
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false;
    };

    /* --- GPX 處理功能區 --- */
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('gpxFile');
    const resultBox = document.getElementById('resultBox');
    const status = document.getElementById('status');
    const fileLabel = document.getElementById('fileLabel');
    const nameInput = document.getElementById('fileNameInput');

    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            processGPX();
        }
    };

    fileInput.onchange = processGPX;

    function resetAll() {
        fileInput.value = "";
        resultBox.innerText = "";
        nameInput.value = "";
        fileLabel.innerText = "選取或拖入 .gpx 檔案";
        status.style.display = "none";
    }

    async function getCombinedCountryNames(lat, lon) {
        try {
            const fetchEN = fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=3&addressdetails=1`, { headers: { 'Accept-Language': 'en' } }).then(r => r.json());
            const fetchZH = fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=3&addressdetails=1`, { headers: { 'Accept-Language': 'zh-TW' } }).then(r => r.json());
            const [dataEN, dataZH] = await Promise.all([fetchEN, fetchZH]);
            const nameEN = (dataEN.address && dataEN.address.country ? dataEN.address.country : "Unknown").replace(/\s+/g, '');
            const nameZH = (dataZH.address && dataZH.address.country ? dataZH.address.country : "未知").replace(/\s+/g, '');
            return `${nameEN}(${nameZH})`;
        } catch (e) { return "Unknown(未知)"; }
    }

    async function processGPX() {
        if (fileInput.files.length === 0) return;
        const file = fileInput.files[0];
        fileLabel.innerText = "已選：" + file.name;
        status.innerText = "正在進行位置辨識與去重...";
        status.style.display = "block";
        
        try {
            const text = await file.text();
            const regex = /lat=["']([\d.-]+)["']\s+lon=["']([\d.-]+)["']|lon=["']([\d.-]+)["']\s+lat=["']([\d.-]+)["']/g;
            let rawCoords = [];
            let m;
            while ((m = regex.exec(text)) !== null) {
                let lat = m[1] !== undefined ? m[1] : m[4];
                let lon = m[1] !== undefined ? m[2] : m[3];
                rawCoords.push(`${lat},${lon}`);
            }
            if (rawCoords.length === 0) {
                resultBox.innerText = "無法解析座標。";
                status.innerText = "❌ 解析失敗";
                return;
            }
            const uniqueCoords = [];
            const seen = new Set();
            rawCoords.forEach(coord => {
                if (!seen.has(coord)) {
                    seen.add(coord);
                    uniqueCoords.push(coord);
                }
            });
            resultBox.innerText = uniqueCoords.join('\n');
            const firstPt = uniqueCoords[0].split(',');
            const countryTag = await getCombinedCountryNames(firstPt[0], firstPt[1]);
            const now = new Date();
            const dStr = now.getFullYear() + (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
            const randomID = Math.random().toString(36).substring(2, 6);
            nameInput.value = `${countryTag}_${uniqueCoords.length}苗_${dStr}_${randomID}`;
            status.innerText = "✅ 提取完成！";
        } catch (err) {
            resultBox.innerText = "讀取檔案錯誤。";
            status.innerText = "❌ 發生錯誤";
        }
    }

    function selectAllText() {
        const range = document.createRange();
        range.selectNodeContents(resultBox);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
    }

    function copyToClipboard() {
        const text = resultBox.innerText;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            const originalMsg = status.innerText;
            status.innerText = "🚀 已複製到剪貼簿！";
            setTimeout(() => { status.innerText = originalMsg; }, 1500);
        });
    }

    function downloadTxt() {
        const text = resultBox.innerText;
        if (!text) return alert("沒有座標資料");
        const baseName = nameInput.value.trim() || "coordinates";
        const finalFileName = `(純座標)${baseName}.txt`;
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = finalFileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
