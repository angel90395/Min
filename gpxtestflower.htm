<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>皮克敏種花路徑生成修改器</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --p-green: #2f9e44; --p-blue: #1971c2; --p-orange: #f08c00; --p-red: #e03131; --p-dark: #343a40; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background: #f8f9fa; font-family: -apple-system, "微軟正黑體", sans-serif; overflow: hidden; }
        
        /* 選單系統 */
        #side-menu { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: white; z-index: 10005; transition: 0.3s; box-shadow: 2px 0 15px rgba(0,0,0,0.2); padding-top: 70px; }
        #side-menu.open { left: 0; }
        .menu-item { padding: 18px 25px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; color: var(--p-dark); font-size: 15px; }
        .menu-item:active { background: #f1f3f5; color: var(--p-green); }
        #menu-btn { position: fixed; top: 15px; left: 15px; z-index: 10006; background: white; border: 2px solid var(--p-green); border-radius: 10px; padding: 8px 12px; cursor: pointer; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        #controls { width: 100%; height: 100%; padding: 20px; padding-top: 80px; padding-bottom: 160px; background: white; z-index: 100; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .is-hidden { display: none !important; }

        #bulletin-section { background: #fff9db; border: 2px solid #fab005; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        #bulletin-section h4 { margin: 0 0 10px 0; color: #d9480f; border-bottom: 2px solid #ffe066; padding-bottom: 5px; }
        #bulletin-section ul { padding-left: 20px; margin: 10px 0; }
        #bulletin-section li { margin-bottom: 8px; font-weight: bold; color: #444; font-size: 14px; }
        
        .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #dee2e6; border-left: 6px solid var(--p-green); }
        .mode-option, .order-option { display: flex; align-items: center; padding: 8px; cursor: pointer; font-size: 14px; }
        .mode-option input, .order-option input { margin-right: 12px; width: 20px; height: 20px; accent-color: var(--p-green); }

        .input-toolbar { display: flex; gap: 5px; margin-top: 5px; }
        .tool-btn { flex: 1; padding: 8px; font-size: 12px; border-radius: 6px; border: 1px solid #ced4da; background: #f8f9fa; cursor: pointer; font-weight: bold; }

        /* 地圖介面與統計 */
        #map-container { position: fixed; bottom: 20px; right: 20px; width: 340px; height: 340px; z-index: 999; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.3); border-radius: 20px; border: 4px solid #fff; overflow: hidden; background: white; transition: 0.3s; }
        #map-container.is-fullscreen { top: 0; left: 0; width: 100vw; height: 100vh; border-radius: 0; border: none; z-index: 9999; }
        #map { width: 100%; height: 100%; background: #eee; }

        #map-sidebar-wrapper { position: absolute; top: 120px; left: 15px; z-index: 2000; display: flex; flex-direction: column; width: 195px; }
        #map-container.is-fullscreen #map-sidebar-wrapper { top: 20px; }
        #stat-panel { background: var(--p-dark); padding: 12px; border-radius: 12px; color: white; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .stat-line { font-size: 11px; font-weight: bold; margin: 3px 0; display: flex; align-items: center; gap: 8px; }
        .speed-ctrl { display: flex; gap: 5px; align-items: center; background: #495057; border-radius: 6px; padding: 2px 6px; }
        .speed-btn { background: none; border: none; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }

        #map-sidebar { background: rgba(255,255,255,0.95); border-radius: 12px; padding: 6px; display: flex; flex-direction: column; gap: 5px; }
        .sidebar-btn { background: #fff; border: 1px solid #ced4da; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: bold; text-align: left; cursor: pointer; }
        .sidebar-btn.active { background: var(--p-green); color: white; border-color: var(--p-green); }

        /* 底部編輯器 */
        #bottom-editor { position: absolute; bottom: 140px; left: 5%; width: 90%; background: white; z-index: 10001; border: 2.5px solid var(--p-green); border-radius: 20px; padding: 15px 12px; display: none; flex-direction: column; gap: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        #edit-label { font-size: 12px; font-weight: bold; color: var(--p-green); text-align: center; margin-bottom: 5px; }
        .action-row { display: flex; gap: 6px; justify-content: center; width: 100%; }
        .btn-act { flex: 1; padding: 13px 2px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }

        .number-icon { background: var(--p-red); border: 2.5px solid white; border-radius: 50%; color: white; font-weight: 800; text-align: center; font-size: 14px; width: 34px !important; height: 34px !important; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 8px rgba(0,0,0,0.3); }
        .number-icon.selected { background: var(--p-green); transform: scale(1.15); z-index: 1000 !important; }

        /* 複製視窗 */
        #copy-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: white; z-index: 20000; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); padding: 20px; display: none; }
        #copy-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 19999; display: none; }
        .modal-tab { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { padding: 8px 12px; font-size: 12px; border-radius: 6px; border: 1px solid #ddd; background: #eee; cursor: pointer; }
        .tab-btn.active { background: var(--p-green); color: white; border-color: var(--p-green); }

        .map-btn-group { position: absolute; top: 100px; right: 15px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        #map-container.is-fullscreen .map-btn-group { top: 20px; }
        .map-ctrl-btn { background: rgba(0,0,0,0.85); color: white; border: none; padding: 12px 16px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 13px; }

        textarea { width: 100%; height: 120px; font-size: 16px; border: 1.5px solid #ced4da; border-radius: 8px; padding: 12px; }
        button.main-btn { width: 100%; padding: 18px; margin: 8px 0; border: none; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: bold; color: white; transition: 0.2s; }
        
        .app-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .app-opt { border: 1px solid #ddd; padding: 8px; border-radius: 8px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: bold; }
    </style>
    
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
        (function(){
            setInterval(() => {
                const s = new Date(); debugger;
                if (new Date() - s > 300) { window.location.href = "about:blank"; }
            }, 2500);
        })();
    </script>
</head>
<body>

<button id="menu-btn" onclick="toggleMenu()">☰</button>
<div id="side-menu">
    <div class="menu-item" onclick="navigate('guideline')">使用守則</div>
    <div class="menu-item" onclick="navigate('generator')">路徑生成器</div>
    <div class="menu-item" onclick="navigate('modifier')">路徑修改器</div>
    <div class="menu-item" onclick="navigate('feedback')">意見反饋</div>
</div>

<div id="controls">
    <h2 id="page-title" style="margin: 0 0 20px; text-align: center; color: var(--p-green);">路徑生成器</h2>
    
    <div id="bulletin-section">
        <h4>📢 生成器的用途與目的</h4>
        <p>這是一個方便皮克敏飛人收果、種花的 GPX 生成器，但請不要用來產生別人的花田路徑，請自律當一個友善的飛人。</p>
        <h4>⚠️ 自律守則：</h4>
        <ul>
            <li>1.有花痕的田 不開發 不占為己用</li>
            <li>2.有開花的田 僅生成收果路線</li>
            <li>3.檔案請自用，不要分享。</li>
        </ul>
        <button class="main-btn" style="background:var(--p-green)" onclick="acceptNotice()">好的，我願意遵守並理解</button>
    </div>

    <div id="main-generator-area" style="display:none;">
        <div class="card">
            <label style="font-weight:bold; margin-bottom:10px; display:block;">1. 選擇生成模式</label>
            <label class="mode-option"><input type="checkbox" name="pathMode" value="linear" checked> 座標串連(過苗心/可種花)</label>
            <label class="mode-option"><input type="checkbox" name="pathMode" value="z-shape"> Z字圖形</label>
            <label class="mode-option"><input type="checkbox" name="pathMode" value="s-shape"> S型圖形</label>
        </div>

        <div class="card" style="border-left-color: var(--p-orange);">
            <label style="font-weight:bold; margin-bottom:5px; display:block;">2. 排序方式</label>
            <div style="display: flex; gap: 15px;">
                <label class="order-option"><input type="radio" name="orderType" value="original" checked> 照原始順序</label>
                <label class="order-option"><input type="radio" name="orderType" value="shortest"> 最短距離</label>
            </div>
        </div>

        <div class="card" style="border-left-color: var(--p-blue);">
            <label style="font-weight:bold; margin-bottom:5px; display:block;">3. 選擇飛機程式</label>
            <div class="app-select-grid">
                <label class="app-opt"><input type="radio" name="appType" value="A" checked> (A) JoyStick</label>
                <label class="app-opt"><input type="radio" name="appType" value="B"> (B) PoGoskill</label>
                <label class="app-opt"><input type="radio" name="appType" value="C"> (C) Flashman</label>
                <label class="app-opt"><input type="radio" name="appType" value="D"> (D) 魅影</label>
                <label class="app-opt"><input type="radio" name="appType" value="E"> (E) iAnyGo</label>
                <label class="app-opt"><input type="radio" name="appType" value="F"> (F) FakeGPS</label>
            </div>
        </div>

        <div class="card" style="border-left-color: #fcc419;">
            <select id="sourceType" onchange="toggleSource()" style="width:100%; padding:10px; border-radius:10px; border:1.5px solid #ced4da; margin-bottom:10px;">
                <option value="manual">手動貼上座標</option>
                <option value="file">上傳 GPX 檔案</option>
            </select>
            <div id="manualSection">
                <textarea id="coordInput" placeholder="緯度,經度"></textarea>
                <div class="input-toolbar">
                    <button class="tool-btn" onclick="clearData()">清除</button>
                    <button class="tool-btn" onclick="inputAction('all')">全選</button>
                    <button class="tool-btn" onclick="inputAction('copy')">複製</button>
                    <button class="tool-btn" onclick="inputAction('paste')">貼上</button>
                </div>
            </div>
            <div id="fileSection" class="is-hidden">
                <input type="file" id="gpxFile" accept=".gpx,.xml,application/gpx+xml,application/xml,text/xml,text/plain,*/*" style="width: 100%; padding: 10px;">
            </div>
        </div>

        <div style="display: flex; gap: 8px; flex-direction: column;">
            <div style="display: flex; gap: 8px;">
                <button class="main-btn" style="background:var(--p-green); flex: 1;" onclick="processAll(true)">生成路徑 並 預覽地圖</button>
                <button class="main-btn" style="background:var(--p-orange); flex: 1; font-size: 13px;" onclick="handleCopyRequest()">座標複製</button>
            </div>
            <button class="main-btn" style="background:var(--p-blue)" onclick="processAll(false)">直接下載 GPX</button>
        </div>
    </div>
</div>

<div id="copy-modal-overlay" onclick="closeCopyModal()"></div>
<div id="copy-modal">
    <h3 style="margin-top:0; color:var(--p-green)">純座標複製</h3>
    <div class="modal-tab" id="modal-tabs"></div>
    <textarea id="modal-text" style="height: 200px; font-size: 12px; margin-bottom: 10px;" readonly></textarea>
    <div style="display: flex; gap: 10px;">
        <button class="main-btn" style="background:var(--p-green); margin:0; padding:12px;" onclick="copyModalText()">一鍵複製座標</button>
        <button class="main-btn" style="background:#888; margin:0; padding:12px;" onclick="closeCopyModal()">關閉</button>
    </div>
</div>

<div id="map-container">
    <div id="map-sidebar-wrapper" class="is-hidden">
        <div id="stat-panel">
            <div class="stat-line" id="dist-val">總距離：0.00 km</div>
            <div class="stat-line">時速：
                <div class="speed-ctrl">
                    <button class="speed-btn" onclick="adjustSpeed(-1)">-</button>
                    <span id="speed-val">20</span>
                    <button class="speed-btn" onclick="adjustSpeed(1)">+</button>
                </div>
            </div>
            <div class="stat-line" id="time-val">預計時間：0 min</div>
        </div>
        <div id="map-sidebar"><div id="sidebar-btns"></div></div>
    </div>

    <div class="map-btn-group">
        <button class="map-ctrl-btn" onclick="toggleSize()">全頻/縮小</button>
        <button class="map-ctrl-btn" style="background:var(--p-green)" id="btn-final-save" onclick="downloadActive()">儲存下載</button>
        <button class="map-ctrl-btn" style="background:var(--p-red)" onclick="closeMap()">關閉預覽</button>
    </div>
    <div id="map"></div>

    <div id="bottom-editor">
        <div id="edit-label">座標編輯</div>
        <div class="action-row">
            <button class="btn-act" style="background:var(--p-orange); color:white" onclick="togglePickingMode()">👆 自選順序</button>
            <button class="btn-act" style="background:#f1f3f5" onclick="moveSequence(-1)">⬆ 前移</button>
            <button class="btn-act" style="background:#f1f3f5" onclick="moveSequence(1)">⬇ 後移</button>
        </div>
        <div class="action-row">
            <button class="btn-act" style="background:#f1f3f5" onclick="rotatePoint(45)">↻ 旋轉圖形</button>
            <button class="btn-act" style="background:#fd7e14; color:white; flex: 1.2" onclick="restoreGlobalOriginal()">⏮ 恢復原始</button>
            <button class="btn-act" style="background:var(--p-red); color:white" onclick="deletePoint()">🗑️ 刪除組</button>
            <button class="btn-act" style="background:var(--p-dark); color:white" onclick="closeEditor()">完成</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script>
    var map, currentData = [], rawBackup = [], activeLayers = {}, markers = [], activeModes = [], editingIdx = -1;
    var isPickingOrder = false, pickedSequence = [], currentSpeed = 20;

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
    function navigate(v) {
        if (document.getElementById('side-menu').classList.contains('open')) toggleMenu();
        closeMap();
        document.getElementById('bulletin-section').classList.toggle('is-hidden', v!=='guideline');
        document.getElementById('main-generator-area').style.display = (v==='generator'?'block':'none');
    }

    function acceptNotice() { navigate('generator'); }
    function toggleSource() { const t = document.getElementById('sourceType').value; document.getElementById('manualSection').classList.toggle('is-hidden', t!=='manual'); document.getElementById('fileSection').classList.toggle('is-hidden', t==='manual'); }
    function clearData() { document.getElementById('coordInput').value = ""; document.getElementById('gpxFile').value = ""; currentData = []; }
    
    async function inputAction(act) {
        const ta = document.getElementById('coordInput');
        if(act === 'all') { ta.focus(); ta.select(); }
        else if(act === 'copy') { await navigator.clipboard.writeText(ta.value); alert("已複製"); }
        else if(act === 'paste') { try { ta.value = await navigator.clipboard.readText(); } catch(e){ alert("請手動貼上"); } }
    }

    function closeMap() { document.getElementById('map-container').style.display = 'none'; closeEditor(); }
    function toggleSize() { document.getElementById('map-container').classList.toggle('is-fullscreen'); setTimeout(() => { if(map) map.invalidateSize(); }, 400); }
    function adjustSpeed(v) { currentSpeed = Math.max(1, currentSpeed + v); document.getElementById('speed-val').innerText = currentSpeed; refreshPaths(); }
    function closeEditor() { document.getElementById('bottom-editor').style.display = 'none'; editingIdx = -1; isPickingOrder = false; refreshPaths(); }

    async function processRawData() {
        try {
            let centers = [];
            if(document.getElementById('sourceType').value === 'manual') {
                const val = document.getElementById('coordInput').value;
                const matches = val.match(/-?\d+\.\d+/g);
                if(!matches || matches.length < 2) return false;
                for(let i=0; i<matches.length; i+=2) centers.push({lng:parseFloat(matches[i+1]), lat:parseFloat(matches[i]), angle:0});
            } else {
                const f = document.getElementById('gpxFile').files[0];
                if(!f) return false;
                const xml = await f.text();
                const regex = /lat=["']([\d.-]+)["']\s+lon=["']([\d.-]+)["']/g;
                let m; while((m = regex.exec(xml))!==null) centers.push({lng:parseFloat(m[2]), lat:parseFloat(m[1]), angle:0});
            }
            if(!centers.length) return false;
            centers = centers.filter((v,i,a)=>a.findIndex(t=>(t.lat===v.lat && t.lng===v.lng))===i);
            if (document.querySelector('input[name="orderType"]:checked').value === 'shortest' && centers.length > 1) {
                const fc = turf.featureCollection(centers.map(p => turf.point([p.lng, p.lat])));
                const ctr = turf.center(fc).geometry.coordinates;
                centers.sort((a,b) => Math.atan2(a.lat - ctr[1], a.lng - ctr[0]) - Math.atan2(b.lat - ctr[1], b.lng - ctr[0]));
            }
            centers.forEach((c, i) => { const n = centers[(i + 1) % centers.length]; c.angle = turf.bearing(turf.point([c.lng, c.lat]), turf.point([n.lng, n.lat])); });
            currentData = centers; rawBackup = JSON.parse(JSON.stringify(centers));
            return true;
        } catch(e) { return false; }
    }

    async function handleCopyRequest() {
        if(await processRawData()) {
            activeModes = Array.from(document.querySelectorAll('input[name="pathMode"]:checked')).map(el => el.value);
            openCopyModal();
        }
    }

    async function processAll(preview) {
        if(await processRawData()) {
            activeModes = Array.from(document.querySelectorAll('input[name="pathMode"]:checked')).map(el => el.value);
            if(!activeModes.length) return alert("請勾選模式");
            if(!preview) { for(const m of activeModes) await exportGPX(getFinalPoly(m), m); }
            else { renderEditor(); openMap(); }
        }
    }

    function openMap() {
        document.getElementById('map-container').style.display = 'block';
        if (!map) { map = L.map('map',{zoomControl:false}); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); L.control.zoom({position:'bottomright'}).addTo(map); }
        // 修復地圖灰色問題：多重重新計算尺寸
        setTimeout(() => map.invalidateSize(), 50);
        setTimeout(() => map.invalidateSize(), 300);
    }

    function renderEditor() {
        const sb = document.getElementById('sidebar-btns'); sb.innerHTML = "";
        Object.values(activeLayers).forEach(lg => lg.remove()); activeLayers = {};
        document.getElementById('map-sidebar-wrapper').classList.remove('is-hidden');
        activeModes.forEach((m, i) => {
            const lg = L.featureGroup(); activeLayers[m] = lg;
            const b = document.createElement('button'); b.className = "sidebar-btn" + (i === 0 ? " active" : "");
            b.innerText = m==='linear'?"座標串連":m==='z-shape'?"Z字圖形":"S型圖形";
            b.onclick = () => { Object.values(activeLayers).forEach(l => l.remove()); lg.addTo(map); document.querySelectorAll('.sidebar-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); closeEditor(); };
            sb.appendChild(b);
            if(i === 0) setTimeout(() => b.click(), 100);
        });
        refreshPaths();
    }

    function buildGroup(curr, mode) {
        const cp = turf.point([curr.lng, curr.lat]); const C = [curr.lng, curr.lat];
        if (mode === 'z-shape') {
            const r = 41; const v = { tl: turf.destination(cp, r, curr.angle-45, {units:'meters'}).geometry.coordinates, tr: turf.destination(cp, r, curr.angle+45, {units:'meters'}).geometry.coordinates, br: turf.destination(cp, r, curr.angle+135, {units:'meters'}).geometry.coordinates, bl: turf.destination(cp, r, curr.angle-135, {units:'meters'}).geometry.coordinates };
            return [v.tl, v.tr, C, v.bl, v.br];
        } 
        if (mode === 's-shape') {
            const r = 30; const v = { tr: turf.destination(cp, r, curr.angle+45, {units:'meters'}).geometry.coordinates, tl: turf.destination(cp, r, curr.angle-45, {units:'meters'}).geometry.coordinates, ml: turf.destination(cp, r, curr.angle-90, {units:'meters'}).geometry.coordinates, mr: turf.destination(cp, r, curr.angle+90, {units:'meters'}).geometry.coordinates, br: turf.destination(cp, r, curr.angle+135, {units:'meters'}).geometry.coordinates, bl: turf.destination(cp, r, curr.angle-135, {units:'meters'}).geometry.coordinates };
            return [v.tr, v.tl, v.ml, C, v.mr, v.br, v.bl];
        }
        return [C];
    }

    function refreshPaths() {
        const activeBtn = document.querySelector('.sidebar-btn.active'); if(!activeBtn || !map) return;
        const mode = activeModes.find(m => activeBtn.innerText.includes(m==='linear'?"串連":m==='z-shape'?"Z字":"S型"));
        const lg = activeLayers[mode]; if(!lg) return;
        lg.clearLayers(); markers = []; const fullTrack = [];
        for (let i = 0; i < currentData.length; i++) {
            // --- 重大修復：圓框恢復指令 ---
            L.circle([currentData[i].lat, currentData[i].lng], {
                radius: 30,
                color: 'white',
                weight: 1.5,
                fillOpacity: 0.1,
                dashArray: '5, 5',
                interactive: false
            }).addTo(lg);
            
            const group = buildGroup(currentData[i], mode); fullTrack.push(...group);
            const icon = L.divIcon({ className: 'number-icon' + (editingIdx === i ? ' selected' : ''), html: isPickingOrder ? (pickedSequence.indexOf(i)!==-1?pickedSequence.indexOf(i)+1:"?") : i+1, iconSize: [34, 34], iconAnchor: [17, 17] });
            const m = L.marker([currentData[i].lat, currentData[i].lng], { icon: icon }).addTo(lg);
            m.on('click', () => handleMarkerClick(i)); markers.push(m);
            L.polyline(group.map(p => [p[1], p[0]]), { color: editingIdx === i ? '#2f9e44' : '#1971c2', weight: 6, opacity: 0.8 }).addTo(lg).on('click', () => triggerEdit(i));
        }
        if (fullTrack.length) {
            fullTrack.push(fullTrack[0]); L.polyline(fullTrack.map(p => [p[1], p[0]]), { color: '#1971c2', weight: 6, opacity: 0.7 }).addTo(lg);
            const dist = turf.length(turf.lineString(fullTrack), {units: 'kilometers'});
            document.getElementById('dist-val').innerText = `總距離：${dist.toFixed(2)} km`;
            document.getElementById('time-val').innerText = `預計時間：${Math.ceil((dist/currentSpeed)*60)} min`;
            // 修復 fitBounds 報錯：增加標記點檢查
            if(editingIdx === -1 && markers.length > 0) {
                try { map.fitBounds(lg.getBounds(), {padding:[50,50]}); } catch(e) {}
            }
        }
    }

    function togglePickingMode() { isPickingOrder = !isPickingOrder; pickedSequence = []; refreshPaths(); }
    function handleMarkerClick(idx) {
        if (!isPickingOrder) { triggerEdit(idx); return; }
        const pIdx = pickedSequence.indexOf(idx);
        if (pIdx !== -1) pickedSequence.splice(pIdx, 1); else pickedSequence.push(idx);
        refreshPaths();
        if (pickedSequence.length === currentData.length && currentData.length > 0) { currentData = pickedSequence.map(i => currentData[i]); togglePickingMode(); refreshPaths(); }
    }
    function triggerEdit(idx) { editingIdx = idx; document.getElementById('edit-label').innerText = `編輯第 ${idx+1} 組 (${currentData[idx].lat.toFixed(6)},${currentData[idx].lng.toFixed(6)})`; document.getElementById('bottom-editor').style.display = 'flex'; refreshPaths(); }
    function deletePoint() { if(editingIdx < 0) return; currentData.splice(editingIdx, 1); closeEditor(); renderEditor(); }
    function moveSequence(dir) { if(editingIdx < 0) return; const n = editingIdx + dir; if(n >= 0 && n < currentData.length) { [currentData[editingIdx], currentData[n]] = [currentData[n], currentData[editingIdx]]; editingIdx = n; refreshPaths(); triggerEdit(n); } }
    function rotatePoint(v) { if(editingIdx < 0) return; currentData[editingIdx].angle = (currentData[editingIdx].angle + v) % 360; refreshPaths(); }
    function restoreGlobalOriginal() { if(confirm("還原？")) { currentData = JSON.parse(JSON.stringify(rawBackup)); closeEditor(); renderEditor(); } }
    function getFinalPoly(m) { let path = []; currentData.forEach(c => path.push(...buildGroup(c, m))); if (path.length) path.push(path[0]); return path; }

    function openCopyModal() {
        const tabBox = document.getElementById('modal-tabs'); tabBox.innerHTML = "";
        activeModes.forEach((m, i) => {
            const btn = document.createElement('button'); btn.className = "tab-btn" + (i===0?" active":"");
            btn.innerText = m==='linear'?"串連":m==='z-shape'?"Z字":"S型";
            btn.onclick = () => { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); updateModalText(m); };
            tabBox.appendChild(btn);
        });
        document.getElementById('copy-modal-overlay').style.display = "block";
        document.getElementById('copy-modal').style.display = "block";
        updateModalText(activeModes[0]);
    }
    // 座標格式：緯度,經度 (中間無空白)
    function updateModalText(m) { document.getElementById('modal-text').value = getFinalPoly(m).map(p => `${p[1].toFixed(8)},${p[0].toFixed(8)}`).join('\n'); }
    async function copyModalText() { await navigator.clipboard.writeText(document.getElementById('modal-text').value); alert("座標已複製"); }
    function closeCopyModal() { document.getElementById('copy-modal-overlay').style.display = "none"; document.getElementById('copy-modal').style.display = "none"; }

    async function exportGPX(pts, modeKey) {
        const modeMap = { 'linear': '串連', 'z-shape': 'Z字', 's-shape': 'S型' };
        const appType = document.querySelector('input[name="appType"]:checked').value;
        const appMap = { 'A': 'JoyStick', 'B': 'PoGoskill', 'C': 'Flashman', 'D': '魅影', 'E': 'iAnyGo', 'F': 'FakeGPS' };
        const appName = appMap[appType];
        const count = currentData.length;
        const now = new Date(); const dStr = now.getFullYear() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0');
        const rand = Math.random().toString(36).substr(2,5);

        const modeChi = modeMap[modeKey];
        // 內部名稱：模式_數量苗
        const pathName = `${modeChi}_${count}苗`;
        // 檔案名稱：pikmin_模式_數量苗_日期_隨機碼(飛機名稱).gpx
        const fileName = `pikmin_${modeKey}_${count}苗_${dStr}_${rand}(${appName}).gpx`;
        
        const copyright = `專為皮克敏玩家打造的路徑工具\nhttps://flowergpx.pages.dev/\n請自律當一個友善的飛人`;
        let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n\n<gpx version="1.1" creator="PikminGen">`;
        if (['A', 'B', 'E'].includes(appType)) {
            gpx += `\n<trk><name>${pathName}</name><trkseg>`;
            pts.forEach(p => gpx += `\n<trkpt lat="${p[1].toFixed(8)}" lon="${p[0].toFixed(8)}"></trkpt>`);
            gpx += `\n</trkseg></trk>`;
        } else {
            gpx += `\n<name>${pathName}</name>`;
            pts.forEach((p, i) => gpx += `\n<wpt lat="${p[1].toFixed(8)}" lon="${p[0].toFixed(8)}"><name>P${i+1}</name></wpt>`);
        }
        gpx += `\n</gpx>`;
        const blob = new Blob([gpx], { type: 'application/gpx+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = fileName; a.click();
    }
    async function downloadActive() { 
        const activeBtn = document.querySelector('.sidebar-btn.active'); if(!activeBtn) return;
        const mode = activeModes.find(m => activeBtn.innerText.includes(m==='linear'?"串連":m==='z-shape'?"Z字":"S型"));
        await exportGPX(getFinalPoly(mode), mode); 
    }
</script>
