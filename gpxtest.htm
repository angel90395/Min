<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>皮克敏種花路徑生成修改器</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --p-green: #2f9e44; --p-blue: #1971c2; --p-orange: #f08c00; --p-red: #e03131; --p-dark: #343a40; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background: #f8f9fa; font-family: -apple-system, "微軟正黑體", sans-serif; overflow: hidden; }
        
        #side-menu { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: white; z-index: 10005; transition: 0.3s; box-shadow: 2px 0 15px rgba(0,0,0,0.2); padding-top: 70px; }
        #side-menu.open { left: 0; }
        .menu-item { padding: 18px 25px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; color: var(--p-dark); font-size: 15px; }
        #menu-btn { position: fixed; top: 15px; left: 15px; z-index: 10006; background: white; border: 2px solid var(--p-green); border-radius: 10px; padding: 8px 12px; cursor: pointer; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        #controls { width: 100%; height: 100%; padding: 20px; padding-top: 80px; padding-bottom: 120px; background: white; z-index: 100; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .is-hidden { display: none !important; }

        /* 守則與卡片樣式 */
        #bulletin-section { background: #fff9db; border: 2px solid #fab005; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #dee2e6; border-left: 6px solid var(--p-green); }
        .mode-option { display: flex; align-items: center; padding: 10px; cursor: pointer; }
        .mode-option input { margin-right: 12px; width: 22px; height: 22px; accent-color: var(--p-green); }
        
        /* 地圖統計與下載專區 */
        #map-container { position: fixed; bottom: 20px; right: 20px; width: 340px; height: 340px; z-index: 999; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.3); border-radius: 20px; border: 4px solid #fff; overflow: hidden; background: white; }
        #map-container.is-fullscreen { top: 0; left: 0; width: 100vw; height: 100vh; border-radius: 0; border: none; z-index: 9999; }
        #map { width: 100%; height: 100%; }

        #map-sidebar-wrapper { position: absolute; top: 15px; left: 15px; z-index: 2000; display: flex; flex-direction: column; width: 195px; }
        #stat-panel { background: var(--p-dark); padding: 12px; border-radius: 12px; color: white; margin-bottom: 8px; font-size: 11px; }
        #map-dl-group { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .map-dl-btn { background: var(--p-dark); color: white; border: 1px solid #555; padding: 8px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; text-align: left; opacity: 0.9; }

        /* 地圖右側功能鈕 */
        .map-btn-group { position: absolute; bottom: 120px; right: 15px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .map-ctrl-btn { background: rgba(0,0,0,0.8); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 12px; }

        #bottom-editor { position: absolute; bottom: 140px; left: 5%; width: 90%; background: white; z-index: 10001; border: 2.5px solid var(--p-green); border-radius: 20px; padding: 15px 12px; display: none; flex-direction: column; gap: 10px; }
        .btn-act { flex: 1; padding: 13px 2px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }

        textarea { width: 100%; height: 300px; font-size: 16px; border: 1.5px solid #ced4da; border-radius: 8px; padding: 12px; }
        button.main-btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; }
        .number-icon { background: var(--p-red); border: 2.5px solid white; border-radius: 50%; color: white; font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .number-icon.selected { background: var(--p-green); }
    </style>
</head>
<body>

<button id="menu-btn" onclick="toggleMenu()">☰</button>
<div id="side-menu">
    <div class="menu-item" onclick="navigate('guideline')">使用守則</div>
    <div class="menu-item" onclick="navigate('generator')">路徑生成器</div>
</div>

<div id="controls">
    <h2 id="page-title" style="text-align: center; color: var(--p-green);">使用守則</h2>
    
    <div id="bulletin-section">
        <h4>📢 生成器的用途與目的</h4>
        <p>這是一個方便皮克敏飛人收果、種花的 GPX 生成器，但請不要用來產生別人的花田路徑，請自律當一個友善的飛人。</p>
        <button class="main-btn" style="background:var(--p-green)" onclick="acceptNotice()">好的，我願意遵守並理解</button>
    </div>

    <div id="main-generator-area" style="display:none;">
        <div class="card">
            <label style="font-weight:bold; margin-bottom:10px; display:block;">1. 選擇生成模式</label>
            <label class="mode-option"><input type="checkbox" name="pathMode" value="linear" checked> 座標串連(過苗心/可種花)</label>
            <label class="mode-option"><input type="checkbox" name="pathMode" value="harvest"> 純收果(不進入苗心)</label>
            <label class="mode-option"><input type="checkbox" name="pathMode" value="z-shape"> Z字圖形</label>
            <label class="mode-option"><input type="checkbox" name="pathMode" value="s-shape"> S型圖形</label>
        </div>

        <div class="card" style="border-left-color: #fcc419;">
            <textarea id="coordInput" placeholder="緯度, 經度 (25.123, 121.123)"></textarea>
        </div>

        <button class="main-btn" style="background:var(--p-green)" onclick="processAll(true)">生成路徑 並 預覽地圖</button>
    </div>
</div>

<div id="map-container">
    <div id="map-sidebar-wrapper">
        <div id="stat-panel">
            <div id="dist-val">總距離：0.00 km</div>
            <div id="time-val">預計時間：0 min (20km/h)</div>
        </div>
        <div id="map-sidebar"><div id="sidebar-btns"></div></div>
        
        <div id="map-dl-group">
            <button class="map-dl-btn" onclick="downloadFormatted('rte')" style="border-left: 4px solid var(--p-blue);">A - iAnyGo用 GPX 下載</button>
            <button class="map-dl-btn" onclick="downloadFormatted('trk')" style="border-left: 4px solid var(--p-green);">B - GPS JoyStick用 下載</button>
            <button class="map-dl-btn" onclick="downloadFormatted('wpt')" style="border-left: 4px solid var(--p-orange);">C - Flashman用 航點下載</button>
        </div>
    </div>

    <div class="map-btn-group">
        <button class="map-ctrl-btn" onclick="toggleSize()">全頻 / 縮小</button>
        <button class="map-ctrl-btn" style="background:var(--p-red)" onclick="closeMap()">關閉預覽</button>
    </div>

    <div id="map"></div>

    <div id="bottom-editor">
        <div id="edit-label">座標編輯</div>
        <div class="action-row">
            <button id="btn-pick" class="btn-act" style="background:var(--p-orange); color:white" onclick="togglePickingMode()">👆 自選順序</button>
            <button class="btn-act" style="background:#eee" onclick="moveSequence(-1)">⬆ 前移</button>
            <button class="btn-act" style="background:#eee" onclick="moveSequence(1)">⬇ 後移</button>
        </div>
        <div class="action-row">
            <button class="btn-act" style="background:#eee" onclick="rotatePoint(45)">↻ 旋轉圖形</button>
            <button class="btn-act" style="background:var(--p-red); color:white" onclick="deletePoint()">🗑️ 刪除組</button>
            <button class="btn-act" style="background:var(--p-dark); color:white" onclick="closeEditor()">完成</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script>
    var map, currentData = [], activeLayers = {}, markers = [], activeModes = [], editingIdx = -1;
    var isPickingOrder = false, pickedSequence = [];
    const COPYRIGHT = "https://flowergpx.pages.dev/";

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
    function navigate(v) { toggleMenu(); document.getElementById('main-generator-area').style.display = v==='generator'?'block':'none'; document.getElementById('bulletin-section').style.display = v==='guideline'?'block':'none'; }
    function acceptNotice() { navigate('generator'); }
    function closeMap() { 
        document.getElementById('map-container').style.display = 'none'; 
        document.getElementById('menu-btn').style.display = 'block'; // 恢復漢堡選單
        closeEditor(); 
    }
    function toggleSize() { document.getElementById('map-container').classList.toggle('is-fullscreen'); setTimeout(()=>map.invalidateSize(), 400); }
    function closeEditor() { document.getElementById('bottom-editor').style.display = 'none'; editingIdx = -1; isPickingOrder = false; refreshPaths(); }

    async function processAll(preview) {
        activeModes = Array.from(document.querySelectorAll('input[name="pathMode"]:checked')).map(el => el.value);
        if(!activeModes.length) return alert("請勾選模式");
        
        const matches = document.getElementById('coordInput').value.match(/-?\d+\.\d+/g);
        if(!matches) return alert("座標無效");
        currentData = [];
        for(let i=0; i<matches.length; i+=2) currentData.push({lng:parseFloat(matches[i+1]), lat:parseFloat(matches[i]), angle:0});
        
        // 去重
        currentData = currentData.filter((v, i, a) => a.findIndex(t => t.lat === v.lat && t.lng === v.lng) === i);

        if(preview) {
            document.getElementById('map-container').style.display = 'block';
            document.getElementById('menu-btn').style.display = 'none'; // 地圖模式隱藏漢堡選單
            if(!map) { 
                map = L.map('map', {zoomControl: false}); // 關閉預設
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.control.zoom({position: 'bottomright'}).addTo(map); // 改到右下
            }
            renderSidebar();
        }
    }

    function renderSidebar() {
        const box = document.getElementById('sidebar-btns'); box.innerHTML = "";
        Object.values(activeLayers).forEach(l => l.remove()); activeLayers = {};
        activeModes.forEach((m, i) => {
            const lg = L.featureGroup(); activeLayers[m] = lg;
            const b = document.createElement('button'); b.className = "sidebar-btn" + (i === 0 ? " active" : "");
            const names = {'linear':'過苗心','harvest':'純收果','z-shape':'Z型','s-shape':'S型'};
            b.innerText = names[m];
            b.onclick = () => { Object.values(activeLayers).forEach(l => l.remove()); lg.addTo(map); document.querySelectorAll('.sidebar-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); closeEditor(); };
            box.appendChild(b);
            if(i===0) setTimeout(()=>b.click(), 100);
        });
    }

    function buildGroup(curr, mode) {
        const cp = turf.point([curr.lng, curr.lat]);
        if (mode === 'harvest') {
            const r = 32.5; return [turf.destination(cp, r, curr.angle-30, {units:'meters'}).geometry.coordinates, turf.destination(cp, r, curr.angle+30, {units:'meters'}).geometry.coordinates];
        }
        if (mode === 'z-shape') {
            const r = 41; return [turf.destination(cp, r, curr.angle-45, {units:'meters'}).geometry.coordinates, turf.destination(cp, r, curr.angle+45, {units:'meters'}).geometry.coordinates, [curr.lng, curr.lat], turf.destination(cp, r, curr.angle-135, {units:'meters'}).geometry.coordinates, turf.destination(cp, r, curr.angle+135, {units:'meters'}).geometry.coordinates];
        } 
        if (mode === 's-shape') {
            const r = 30; return [turf.destination(cp, r, curr.angle+45, {units:'meters'}).geometry.coordinates, turf.destination(cp, r, curr.angle-45, {units:'meters'}).geometry.coordinates, turf.destination(cp, r, curr.angle-90, {units:'meters'}).geometry.coordinates, [curr.lng, curr.lat], turf.destination(cp, r, curr.angle+90, {units:'meters'}).geometry.coordinates, turf.destination(cp, r, curr.angle+135, {units:'meters'}).geometry.coordinates, turf.destination(cp, r, curr.angle-135, {units:'meters'}).geometry.coordinates];
        }
        return [[curr.lng, curr.lat]];
    }

    function refreshPaths() {
        const activeBtn = document.querySelector('.sidebar-btn.active'); if(!activeBtn) return;
        const mode = activeModes.find(m => activeBtn.innerText.includes(m==='linear'?'過苗心':m==='harvest'?'純收果':m==='z-shape'?'Z型':'S型'));
        const lg = activeLayers[mode]; if(!lg) return;
        
        lg.clearLayers(); markers = [];
        let fullTrack = [];
        
        currentData.forEach((c, i) => {
            const n = currentData[(i + 1) % currentData.length];
            c.angle = turf.bearing(turf.point([c.lng, c.lat]), turf.point([n.lng, n.lat]));
            
            // 白色虛線示意圓
            L.circle([c.lat, c.lng], {radius: 30, color: 'white', weight: 2, fillOpacity: 0, dashArray: '8, 8'}).addTo(lg);
            
            const group = buildGroup(c, mode);
            fullTrack.push(...group);
            
            // 標籤編號 logic
            const isPicked = pickedSequence.indexOf(i) !== -1;
            const label = isPickingOrder ? (isPicked ? pickedSequence.indexOf(i)+1 : "?") : i+1;
            const icon = L.divIcon({className:'number-icon'+(editingIdx===i?' selected':''), html:label, iconSize:[30,30], iconAnchor:[15,15]});
            
            const m = L.marker([c.lat, c.lng], {icon:icon}).addTo(lg).on('click', () => handleMarkerClick(i));
            markers.push(m);
            
            L.polyline(group.map(p=>[p[1],p[0]]), {color: editingIdx===i?'#ff922b':'#1971c2', weight: 5}).addTo(lg).on('click', ()=>triggerEdit(i));
        });

        if(fullTrack.length > 1) {
            fullTrack.push(fullTrack[0]);
            const poly = L.polyline(fullTrack.map(p=>[p[1],p[0]]), {color:'#1971c2', weight:3, opacity:0.5}).addTo(lg);
            const dist = turf.length(turf.lineString(fullTrack), {units:'kilometers'});
            document.getElementById('dist-val').innerText = `總距離：${dist.toFixed(2)} km`;
            document.getElementById('time-val').innerText = `預計時間：${Math.ceil((dist/20)*60)} min (20km/h)`;
            if(editingIdx === -1) map.fitBounds(lg.getBounds(), {padding:[50,50]});
        }
    }

    function triggerEdit(i) { editingIdx = i; document.getElementById('edit-label').innerText = `編輯第 ${i+1} 組`; document.getElementById('bottom-editor').style.display = 'flex'; refreshPaths(); }
    function togglePickingMode() { isPickingOrder = !isPickingOrder; pickedSequence = []; document.getElementById('btn-pick').innerText = isPickingOrder?"取消選擇":"👆 自選順序"; refreshPaths(); }
    function handleMarkerClick(i) {
        if(isPickingOrder) {
            const idx = pickedSequence.indexOf(i);
            if(idx === -1) pickedSequence.push(i); else pickedSequence.splice(idx, 1);
            if(pickedSequence.length === currentData.length) {
                currentData = pickedSequence.map(s => currentData[s]);
                togglePickingMode();
            }
            refreshPaths();
        } else { triggerEdit(i); }
    }

    function moveSequence(dir) { if(editingIdx<0) return; const n = editingIdx+dir; if(n>=0 && n<currentData.length) { [currentData[editingIdx], currentData[n]] = [currentData[n], currentData[editingIdx]]; editingIdx = n; refreshPaths(); triggerEdit(n); } }
    function rotatePoint(v) { if(editingIdx<0) return; currentData[editingIdx].angle = (currentData[editingIdx].angle + v) % 360; refreshPaths(); }
    function deletePoint() { if(editingIdx>=0) { currentData.splice(editingIdx, 1); closeEditor(); renderSidebar(); } }

    async function downloadFormatted(type) {
        const mode = activeModes[0]; // 依照目前主要模式
        const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
        const rand = Math.random().toString(36).substr(2,5).toUpperCase();
        const baseName = `pikmingpx_${mode}_${currentData.length}苗`;
        const fileName = `${baseName}_${type.toUpperCase()}_${dateStr}_${rand}.gpx`;
        
        let pts = []; currentData.forEach(c => pts.push(...buildGroup(c, mode))); if(pts.length) pts.push(pts[0]);
        
        let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="FlowerGPX"><metadata><name>${baseName}(${type.toUpperCase()}_${dateStr})</name><desc>${COPYRIGHT}</desc></metadata>`;
        if(type==='wpt') {
            currentData.forEach((c, i) => gpx += `\n<wpt lat="${c.lat.toFixed(8)}" lon="${c.lng.toFixed(8)}"><name>Point${i+1}</name></wpt>`);
        } else if(type==='rte') {
            gpx += `\n<rte><name>${baseName}</name>`;
            pts.forEach(p => gpx += `\n<rtept lat="${p[1].toFixed(8)}" lon="${p[0].toFixed(8)}"></rtept>`);
            gpx += `\n</rte>`;
        } else {
            gpx += `\n<trk><name>${baseName}</name><trkseg>`;
            pts.forEach(p => gpx += `\n<trkpt lat="${p[1].toFixed(8)}" lon="${p[0].toFixed(8)}"></trkpt>`);
            gpx += `\n</trkseg></trk>`;
        }
        gpx += `\n</gpx>`;
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([gpx], {type:'application/gpx+xml'})); a.download = fileName; a.click();
    }
</script>
</body>
</html>
