<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>皮克敏種花路徑生成修改器</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --p-green: #2f9e44; --p-blue: #1971c2; --p-orange: #f08c00; --p-red: #e03131; --p-dark: #343a40; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background: #f8f9fa; font-family: -apple-system, "微軟正黑體", sans-serif; overflow: hidden; }
        
        #side-menu { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: white; z-index: 10005; transition: 0.3s; box-shadow: 2px 0 15px rgba(0,0,0,0.2); padding-top: 70px; }
        #side-menu.open { left: 0; }
        .menu-item { padding: 18px 25px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; color: var(--p-dark); font-size: 15px; }
        #menu-btn { position: fixed; top: 15px; left: 15px; z-index: 10006; background: white; border: 2px solid var(--p-green); border-radius: 10px; padding: 8px 12px; cursor: pointer; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        #controls { width: 100%; height: 100%; padding: 20px; padding-top: 80px; padding-bottom: 50px; background: white; z-index: 100; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .is-hidden { display: none !important; }

        #bulletin-section { background: #fff9db; border: 2px solid #fab005; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .instruction-card { background: #e7f5ff; border-radius: 12px; padding: 15px; margin-bottom: 20px; border-left: 6px solid var(--p-blue); }
        .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #dee2e6; border-left: 6px solid var(--p-green); }
        .mode-option, .order-option { display: flex; align-items: center; padding: 10px; cursor: pointer; }
        .mode-option input { margin-right: 12px; width: 22px; height: 22px; accent-color: var(--p-green); }

        /* 座標工具與下載區 */
        .input-tool-bar { display: flex; gap: 5px; margin-top: 8px; }
        .btn-mini { flex: 1; padding: 8px; font-size: 12px; font-weight: bold; background: #eee; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; }
        .download-hint { text-align: center; font-size: 11px; color: #777; margin: 15px 0 5px; }
        .dl-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .btn-dl { padding: 15px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; }

        /* 複製視窗優化：新增模式切換 */
        #copy-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .copy-card { background: white; width: 100%; max-width: 500px; border-radius: 15px; padding: 20px; position: relative; }
        .mode-tabs { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 8px 12px; border-radius: 20px; border: 1.5px solid #ddd; background: white; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--p-green); color: white; border-color: var(--p-green); }
        #copy-area { width: 100%; height: 220px; font-size: 12px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-family: monospace; }

        #map-container { position: fixed; bottom: 20px; right: 20px; width: 340px; height: 340px; z-index: 999; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.3); border-radius: 20px; border: 4px solid #fff; overflow: hidden; }
        #map-container.is-fullscreen { top: 0; left: 0; width: 100vw; height: 100vh; border-radius: 0; border: none; z-index: 9999; }
        #map { width: 100%; height: 100%; }
        
        .map-btn-group { position: absolute; top: 100px; right: 15px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .map-ctrl-btn { background: rgba(0,0,0,0.85); color: white; border: none; padding: 12px 16px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        #bottom-editor { position: absolute; bottom: 140px; left: 5%; width: 90%; background: white; z-index: 10001; border: 2.5px solid var(--p-green); border-radius: 20px; padding: 15px 12px; display: none; flex-direction: column; gap: 10px; }
        .action-row { display: flex; gap: 6px; justify-content: center; width: 100%; }
        .btn-act { flex: 1; padding: 13px 2px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }

        textarea { width: 100%; height: 120px; font-size: 16px; border: 1.5px solid #ced4da; border-radius: 8px; padding: 12px; }
        button.main-btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; }
    </style>
</head>
<body oncontextmenu="return false;">

<button id="menu-btn" onclick="toggleMenu()">☰</button>
<div id="side-menu">
    <div class="menu-item" onclick="navigate('guideline')">使用守則</div>
    <div class="menu-item" onclick="navigate('generator')">路徑生成器</div>
</div>

<div id="controls">
    <h2 id="page-title" style="text-align: center; color: var(--p-green);">路徑生成器</h2>
    
    <div id="bulletin-section">
        <h4>📢 生成器的用途與目的</h4>
        <p>這是一個方便皮克敏飛人產生收果、種花的 GPX 生成器，但請不要用來產生別人的花田路徑，請自律當一個友善的飛人。</p>
        <button class="main-btn" style="background:var(--p-green)" onclick="acceptNotice()">我願意遵守自律守則</button>
    </div>

    <div id="main-generator-area" style="display:none;">
        <div class="card">
            <label style="font-weight:bold; margin-bottom:10px; display:block;">1. 選擇生成模式 (可複選)</label>
            <label class="mode-option"><input type="checkbox" name="pathMode" value="linear" checked> 座標串連(過苗心/可種花)</label>
            <label class="mode-option"><input type="checkbox" name="pathMode" value="harvest"> 純收果(不進入苗心)</label>
            <label class="mode-option"><input type="checkbox" name="pathMode" value="z-shape"> Z字圖形</label>
            <label class="mode-option"><input type="checkbox" name="pathMode" value="s-shape"> S型圖形</label>
        </div>

        <div class="card" style="border-left-color: #fcc419;">
            <select id="sourceType" onchange="toggleSource()" style="width:100%; padding:15px; border-radius:10px;">
                <option value="manual">手動貼上座標</option>
                <option value="file">上傳 GPX 檔案</option>
            </select>
            <div id="manualSection" style="margin-top:10px;">
                <textarea id="coordInput" placeholder="緯度, 經度 (25.123, 121.123)"></textarea>
                <div class="input-tool-bar">
                    <button class="btn-mini" onclick="inputTool('select')">全選</button>
                    <button class="btn-mini" onclick="inputTool('copy')">複製</button>
                    <button class="btn-mini" onclick="inputTool('paste')">貼上</button>
                    <button class="btn-mini" style="color:var(--p-red)" onclick="clearData()">清除</button>
                </div>
            </div>
            <div id="fileSection" class="is-hidden" style="margin-top:10px;">
                <input type="file" id="gpxFile" accept=".gpx,.xml" style="width:100%;">
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="main-btn" style="background:var(--p-green); flex: 1.5;" onclick="processAll(true)">生成路徑 並 預覽地圖</button>
            <button class="main-btn" style="background:var(--p-orange); flex: 1; font-size:13px;" onclick="openCopyModal()">生成座標直接複製</button>
        </div>

        <div class="download-hint">GPS JoyStick 基本上三種檔案都能匯入推薦使用 B<br>若有其他飛機使用者歡迎回報給我使用的GPX格式</div>
        <div class="dl-grid">
            <button class="btn-dl" style="background:var(--p-blue)" onclick="downloadTypedGPX('rte')">A<br>iAnyGo用 GPX下載</button>
            <button class="btn-dl" style="background:var(--p-green)" onclick="downloadTypedGPX('trk')">B<br>GPS JoyStick用 GPX下載</button>
            <button class="btn-dl" style="background:var(--p-dark)" onclick="downloadTypedGPX('wpt')">C<br>Flashman用 GPX下載</button>
        </div>
    </div>
</div>

<div id="copy-overlay" onclick="this.style.display='none'">
    <div class="copy-card" onclick="event.stopPropagation()">
        <h4 style="margin:0 0 10px; color:var(--p-green)">複製路徑座標</h4>
        <div class="mode-tabs" id="modal-tabs"></div>
        <textarea id="copy-area" readonly></textarea>
        <button class="main-btn" style="background:var(--p-green)" onclick="doCopyClipboard()">點擊複製到剪貼簿</button>
    </div>
</div>

<div id="map-container">
    <div class="map-btn-group">
        <button class="map-ctrl-btn" onclick="toggleSize()">全頻/縮小</button>
        <button class="map-ctrl-btn" style="background:var(--p-red)" onclick="closeMap()">關閉預覽</button>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script>
    var map, currentData = [], activeModes = [], markers = [];
    const COPYRIGHT_TEXT = "這是專為皮克敏的空軍玩家打造的路徑工具\n主要是方便皮克敏飛人產生收果、種花的GPX生成器\n請不要用來產生別人的花田路徑，請自律當一個友善的飛人\nhttps://flowergpx.pages.dev/";

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
    function navigate(v) { toggleMenu(); document.getElementById('main-generator-area').style.display = v==='generator'?'block':'none'; document.getElementById('bulletin-section').style.display = v==='guideline'?'block':'none'; }
    function acceptNotice() { navigate('generator'); }
    function toggleSource() { const t = document.getElementById('sourceType').value; document.getElementById('manualSection').classList.toggle('is-hidden', t!=='manual'); document.getElementById('fileSection').classList.toggle('is-hidden', t==='manual'); }
    function clearData() { document.getElementById('coordInput').value = ""; document.getElementById('gpxFile').value = ""; }
    function closeMap() { document.getElementById('map-container').style.display = 'none'; }
    function toggleSize() { document.getElementById('map-container').classList.toggle('is-fullscreen'); setTimeout(() => map.invalidateSize(), 400); }

    async function inputTool(act) {
        const area = document.getElementById('coordInput');
        if(act==='select') { area.focus(); area.select(); }
        if(act==='copy') { navigator.clipboard.writeText(area.value); alert("已複製原始資料"); }
        if(act==='paste') { try { const t = await navigator.clipboard.readText(); area.value += t; } catch(e){ alert("瀏覽器拒絕貼上，請手動長按貼上"); } }
    }

    async function getCenters() {
        let pts = [];
        if(document.getElementById('sourceType').value === 'manual') {
            const matches = document.getElementById('coordInput').value.match(/-?\d+\.\d+/g);
            if(!matches) return [];
            for(let i=0; i<matches.length; i+=2) pts.push({lng:parseFloat(matches[i+1]), lat:parseFloat(matches[i])});
        } else {
            const f = document.getElementById('gpxFile').files[0]; if(!f) return [];
            const xml = await f.text();
            const regex = /lat=["']([\d.-]+)["']\s+lon=["']([\d.-]+)["']/g;
            let m; while((m = regex.exec(xml))!==null) pts.push({lng:parseFloat(m[2]), lat:parseFloat(m[1])});
        }
        return pts.filter((v, i, a) => a.findIndex(t => t.lat === v.lat && t.lng === v.lng) === i);
    }

    // 核心邏輯：純收果邏輯修正
    function buildGroup(curr, mode) {
        const cp = turf.point([curr.lng, curr.lat]);
        const C = [curr.lng, curr.lat];
        if (mode === 'harvest') {
            // 收果邏輯：線條不進入圓心(R=30m)，維持在圓外4公尺內 (約32m處)
            // 產生一個隨機角度的鑽石型路徑，保證能覆蓋到收果判定點又不踏入花田
            const dist = 32.5; // 公尺
            const baseAngle = curr.angle || 0;
            const p1 = turf.destination(cp, dist, baseAngle - 30, {units:'meters'}).geometry.coordinates;
            const p2 = turf.destination(cp, dist, baseAngle + 30, {units:'meters'}).geometry.coordinates;
            return [p1, p2]; // 兩點即可連線，既在判定範圍內又不經過圓心
        }
        if (mode === 'z-shape') {
            const r = 41;
            const v = { tl: turf.destination(cp, r, curr.angle-45, {units:'meters'}).geometry.coordinates, tr: turf.destination(cp, r, curr.angle+45, {units:'meters'}).geometry.coordinates, br: turf.destination(cp, r, curr.angle+135, {units:'meters'}).geometry.coordinates, bl: turf.destination(cp, r, curr.angle-135, {units:'meters'}).geometry.coordinates };
            return [v.tl, v.tr, C, v.bl, v.br];
        } 
        if (mode === 's-shape') {
            const r = 30;
            const v = { tr: turf.destination(cp, r, curr.angle+45, {units:'meters'}).geometry.coordinates, tl: turf.destination(cp, r, curr.angle-45, {units:'meters'}).geometry.coordinates, ml: turf.destination(cp, r, curr.angle-90, {units:'meters'}).geometry.coordinates, mr: turf.destination(cp, r, curr.angle+90, {units:'meters'}).geometry.coordinates, br: turf.destination(cp, r, curr.angle+135, {units:'meters'}).geometry.coordinates, bl: turf.destination(cp, r, curr.angle-135, {units:'meters'}).geometry.coordinates };
            return [v.tr, v.tl, v.ml, C, v.mr, v.br, v.bl];
        }
        return [C];
    }

    async function processAll(preview) {
        activeModes = Array.from(document.querySelectorAll('input[name="pathMode"]:checked')).map(el => el.value);
        if(!activeModes.length) return alert("請勾選模式");
        currentData = await getCenters();
        if(!currentData.length) return alert("座標無效");

        currentData.forEach((c, i) => {
            const n = currentData[(i + 1) % currentData.length];
            c.angle = turf.bearing(turf.point([c.lng, c.lat]), turf.point([n.lng, n.lat]));
        });

        if(preview) {
            document.getElementById('map-container').style.display = 'block';
            if(!map) { map = L.map('map').setView([0,0],2); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); }
            markers.forEach(m => m.remove()); markers = [];
            let allPts = [];
            currentData.forEach(c => allPts.push(...buildGroup(c, activeModes[0])));
            const poly = L.polyline(allPts.map(p => [p[1],p[0]]), {color:'blue'}).addTo(map);
            markers.push(poly);
            map.fitBounds(poly.getBounds());
        }
    }

    // 複製視窗切換邏輯
    let cachedCoords = {};
    async function openCopyModal() {
        activeModes = Array.from(document.querySelectorAll('input[name="pathMode"]:checked')).map(el => el.value);
        currentData = await getCenters();
        if(!currentData.length) return alert("座標無效");

        const tabContainer = document.getElementById('modal-tabs');
        tabContainer.innerHTML = "";
        cachedCoords = {};

        const modeMap = {'linear':'過苗心','harvest':'純收果','z-shape':'Z型','s-shape':'S型'};

        activeModes.forEach((m, idx) => {
            let out = "";
            currentData.forEach(c => buildGroup(c, m).forEach(p => out += `${p[1].toFixed(6)}, ${p[0].toFixed(6)}\n`));
            cachedCoords[m] = out;

            const btn = document.createElement('button');
            btn.className = "tab-btn" + (idx===0?' active':'');
            btn.innerText = modeMap[m];
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('copy-area').value = cachedCoords[m];
            };
            tabContainer.appendChild(btn);
        });

        document.getElementById('copy-area').value = cachedCoords[activeModes[0]];
        document.getElementById('copy-overlay').style.display = 'flex';
    }

    function doCopyClipboard() { document.getElementById('copy-area').select(); document.execCommand('copy'); alert("已複製全部座標"); }

    // 檔名邏輯與地理編碼
    async function getCountryName(lat, lng) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=zh-TW`);
            const data = await res.json();
            return data.address.country || "未知";
        } catch(e) { return "地區"; }
    }

    async function downloadTypedGPX(type) {
        currentData = await getCenters();
        if(!currentData.length) return alert("座標無效");
        const m = Array.from(document.querySelectorAll('input[name="pathMode"]:checked')).map(el => el.value)[0] || 'linear';
        
        const country = await getCountryName(currentData[0].lat, currentData[0].lng);
        const fileName = `pikmin_gpx_${country}_${currentData.length}苗.gpx`;

        let pts = [];
        currentData.forEach(c => pts.push(...buildGroup(c, m)));
        if(pts.length) pts.push(pts[0]);

        let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="FlowerGPX">
  <metadata>
    <desc>${COPYRIGHT_TEXT}</desc>
  </metadata>`;
        
        if(type==='wpt') {
            pts.forEach((p, i) => gpx += `\n  <wpt lat="${p[1].toFixed(8)}" lon="${p[0].toFixed(8)}"><name>P${i+1}</name><cmt>${COPYRIGHT_TEXT}</cmt></wpt>`);
        } else if(type==='rte') {
            gpx += `\n  <rte><name>Pikmin Route</name><desc>${COPYRIGHT_TEXT}</desc>`;
            pts.forEach(p => gpx += `\n    <rtept lat="${p[1].toFixed(8)}" lon="${p[0].toFixed(8)}"></rtept>`);
            gpx += `\n  </rte>`;
        } else {
            gpx += `\n  <trk><name>Pikmin Track</name><desc>${COPYRIGHT_TEXT}</desc><trkseg>`;
            pts.forEach(p => gpx += `\n    <trkpt lat="${p[1].toFixed(8)}" lon="${p[0].toFixed(8)}"></trkpt>`);
            gpx += `\n  </trkseg></trk>`;
        }
        gpx += `\n</gpx>`;

        const blob = new Blob([gpx], { type: 'application/gpx+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = fileName; a.click();
    }
</script>
</body>
</html>
