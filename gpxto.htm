<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏花農工具｜多格式轉換</title>
    <style>
        :root {
            --primary: #2f9e44;
            --primary-light: #ebfbee;
            --secondary: #1971c2;
            --bg: #f8f9fa;
            --text: #212529;
            --card-bg: #ffffff;
            --border: #e9ecef;
            --danger: #e03131;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "微軟正黑體", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 550px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        /* 步驟卡片 */
        .step-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid var(--border);
            position: relative;
        }

        .step-number {
            position: absolute; top: -12px; left: 24px;
            background: var(--primary); color: white;
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold;
        }

        label { font-weight: 700; display: block; margin-bottom: 15px; font-size: 16px; }

        /* 上傳與清空 */
        .upload-row { display: flex; gap: 10px; align-items: stretch; }
        .upload-area {
            flex: 1; border: 2px dashed #ced4da; border-radius: 12px;
            padding: 20px; text-align: center; cursor: pointer;
            background: var(--primary-light); transition: 0.2s;
        }
        .upload-area.dragover { border-color: var(--primary); background: #d3f9d8; }
        .upload-area p { margin: 0; font-size: 14px; color: var(--primary); font-weight: 500; }
        
        .btn-clear {
            background: #fff; color: var(--danger); border: 1.5px solid var(--danger);
            border-radius: 12px; padding: 0 15px; cursor: pointer; font-weight: bold;
            transition: 0.2s; font-size: 14px;
        }
        .btn-clear:hover { background: #fff5f5; }

        #gpxFile { display: none; }

        /* 複選框格子 */
        .app-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .app-opt {
            border: 1.5px solid var(--border); padding: 12px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; gap: 10px;
            font-size: 14px; transition: 0.2s;
        }
        .app-opt:hover { border-color: var(--primary); }
        .app-opt input[type="checkbox"] {
            accent-color: var(--primary); width: 18px; height: 18px; cursor: pointer;
        }

        /* 檔名預覽 */
        #fileNameInput {
            width: 100%; padding: 14px; border: 2px solid var(--border);
            border-radius: 12px; box-sizing: border-box; font-size: 14px;
            background: #fff; transition: border-color 0.2s;
        }
        #fileNameInput:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }

        .hint { font-size: 12px; color: #868e96; margin-top: 8px; }

        /* 轉換按鈕 */
        .btn-convert {
            width: 100%; padding: 18px; background: var(--primary); color: white;
            border: none; border-radius: 15px; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 8px 20px rgba(47, 158, 68, 0.2);
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-convert:hover { background: #2b8a3e; transform: translateY(-2px); }
        .btn-convert:disabled { background: #adb5bd; cursor: not-allowed; box-shadow: none; transform: none; }

        #status {
            margin-top: 15px; text-align: center; font-size: 13px; color: var(--primary);
            background: var(--primary-light); padding: 10px; border-radius: 10px; display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌱 皮克敏 GPX 批次轉換器</h1>
        <p>上傳一次檔案，同時生成多種格式</p>
    </header>

    <div class="step-card">
        <div class="step-number">1</div>
        <label>導入原始檔案</label>
        <div class="upload-row">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('gpxFile').click()">
                <p id="fileLabel">點擊或拖入 GPX 檔案</p>
                <input type="file" id="gpxFile" accept=".gpx">
            </div>
            <button class="btn-clear" onclick="resetAll()">清空重置</button>
        </div>
    </div>

    <div class="step-card">
        <div class="step-number">2</div>
        <label>選擇要轉換的飛機格式 (可複選)</label>
        <div class="app-grid">
            <label class="app-opt"><input type="checkbox" name="appType" value="JoyStick"> <span>JoyStick (A)</span></label>
            <label class="app-opt"><input type="checkbox" name="appType" value="PoGoskill"> <span>PoGoskill (B)</span></label>
            <label class="app-opt"><input type="checkbox" name="appType" value="Flashman"> <span>Flashman (C)</span></label>
            <label class="app-opt"><input type="checkbox" name="appType" value="魅影"> <span>魅影 (D)</span></label>
            <label class="app-opt"><input type="checkbox" name="appType" value="iAnyGo"> <span>iAnyGo (E)</span></label>
            <label class="app-opt"><input type="checkbox" name="appType" value="FakeGPS"> <span>FakeGPS (F)</span></label>
        </div>
    </div>

    <div class="step-card">
        <div class="step-number">3</div>
        <label>基礎檔名預覽與修改</label>
        <input type="text" id="fileNameInput" placeholder="等待上傳...">
        <p class="hint">※ 下載時會自動在前方補上 (飛機名稱)</p>
        <div id="status"></div>
    </div>

    <button id="convertBtn" class="btn-convert" onclick="batchDownload()">
        🚀 批次轉換並下載
    </button>
</div>

<script>
    let extractedPts = [];
    let currentBaseName = "";
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('gpxFile');
    const nameInput = document.getElementById('fileNameInput');

    // 拖拽
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            autoGenerateName();
        }
    };

    fileInput.onchange = autoGenerateName;

    // 清空重置
    function resetAll() {
        fileInput.value = "";
        extractedPts = [];
        nameInput.value = "";
        document.getElementById('fileLabel').innerText = "點擊或拖入 GPX 檔案";
        document.getElementById('status').style.display = "none";
        document.querySelectorAll('input[name="appType"]').forEach(cb => cb.checked = false);
    }

    async function getCountryName(lat, lon) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=3&addressdetails=1`, {
                headers: { 'Accept-Language': 'en' }
            });
            const data = await res.json();
            return (data.address && data.address.country ? data.address.country : "Unknown").replace(/\s+/g, '');
        } catch (e) { return "Unknown"; }
    }

    async function autoGenerateName() {
        if (fileInput.files.length === 0) return;
        const status = document.getElementById('status');
        const fileLabel = document.getElementById('fileLabel');
        
        fileLabel.innerText = "已選：" + fileInput.files[0].name;
        status.innerText = "正在分析檔案...";
        status.style.display = "block";

        const text = await fileInput.files[0].text();
        const regex = /lat=["']([\d.-]+)["']\s+lon=["']([\d.-]+)["']/g;
        extractedPts = [];
        let m;
        while ((m = regex.exec(text)) !== null) {
            extractedPts.push({ lat: parseFloat(m[1]), lon: parseFloat(m[2]) });
        }

        if (extractedPts.length === 0) {
            status.innerText = "❌ 無法辨識座標";
            return;
        }

        const uniqueCount = extractedPts.filter((pt, idx, self) =>
            idx === self.findIndex((t) => t.lat === pt.lat && t.lon === pt.lon)
        ).length;

        const now = new Date();
        const dStr = now.getFullYear() + (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
        const country = await getCountryName(extractedPts[0].lat, extractedPts[0].lon);
        
        // 基礎檔名：國家_數量_日期_隨機
        currentBaseName = `${country}_${uniqueCount}苗_${dStr}_${Math.random().toString(36).substring(2, 6)}`;
        nameInput.value = currentBaseName;
        status.innerText = `✨ 解析成功：${uniqueCount} 苗 (已去重)`;
    }

    // 批次下載邏輯
    async function batchDownload() {
        const selectedApps = Array.from(document.querySelectorAll('input[name="appType"]:checked')).map(cb => cb.value);
        const baseName = nameInput.value.trim();

        if (extractedPts.length === 0) return alert("請先上傳檔案！");
        if (selectedApps.length === 0) return alert("請至少勾選一個飛機格式！");
        if (!baseName) return alert("檔名不可為空！");

        const copyright = `這是專為皮克敏的空軍玩家打造的路徑工具\n方便產生收果、種花的GPX生成器\n請自律當一個友善的飛人`;

        // 逐一生成並觸發下載
        for (const app of selectedApps) {
            const finalFileName = `(${app})${baseName}`;
            
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="PikminMultiTool">\n`;
            gpx += `  <metadata>\n    <name>${finalFileName}</name>\n    <desc>${copyright}</desc>\n  </metadata>\n`;

            if (['JoyStick', 'PoGoskill', 'iAnyGo'].includes(app)) {
                gpx += `  <trk><name>${finalFileName}</name><trkseg>\n`;
                extractedPts.forEach(p => gpx += `    <trkpt lat="${p.lat.toFixed(8)}" lon="${p.lon.toFixed(8)}"></trkpt>\n`);
                gpx += `  </trkseg></trk>\n`;
            } else {
                extractedPts.forEach((p, i) => {
                    gpx += `  <wpt lat="${p.lat.toFixed(8)}" lon="${p.lon.toFixed(8)}"><name>P${i+1}_${finalFileName}</name></wpt>\n`;
                });
            }
            gpx += `</gpx>`;

            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${finalFileName}.gpx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // 稍微延遲避免瀏覽器阻擋多檔下載
            await new Promise(r => setTimeout(r, 300));
        }
    }
</script>

</body>
</html>
